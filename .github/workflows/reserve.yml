name: Daily Reservation

on:
  schedule:
    # CEST (verano): 21:30 Madrid = 19:30 UTC → cron a las 19:30 UTC, espera ~30 min hasta las 22:00
    # Buffer de 30 min para absorber retrasos de GitHub Actions (típico: 0-15 min)
    - cron: '30 19 * * *'
    # CET (invierno): 21:30 Madrid = 20:30 UTC → cron a las 20:30 UTC, espera ~30 min hasta las 22:00
    # El cron de la temporada equivocada se salta (>35 min de espera → exit)
    - cron: '30 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Ejecutar en modo dry-run (login + consulta sin reservar)'
        type: boolean
        default: false

jobs:
  reserve:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsx index.ts ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          BERNARDO_USER: ${{ secrets.BERNARDO_USER }}
          BERNARDO_PASS: ${{ secrets.BERNARDO_PASS }}
          CECILIO_USER: ${{ secrets.CECILIO_USER }}
          CECILIO_PASS: ${{ secrets.CECILIO_PASS }}
