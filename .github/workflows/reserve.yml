name: Daily Reservation

on:
  schedule:
    # CEST (verano): 21:00 Madrid = 19:00 UTC → cron a las 19:00 UTC, espera ~60 min hasta las 22:00
    # Buffer de 60 min para absorber retrasos de GitHub Actions (máx. observado: ~33 min)
    - cron: '0 19 * * *'
    # CET (invierno): 21:00 Madrid = 20:00 UTC → cron a las 20:00 UTC, espera ~60 min hasta las 22:00
    # El cron de la temporada equivocada se salta (>65 min de espera → exit)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Ejecutar en modo dry-run (login + consulta sin reservar)'
        type: boolean
        default: false

jobs:
  reserve:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsx index.ts ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          BERNARDO_USER: ${{ secrets.BERNARDO_USER }}
          BERNARDO_PASS: ${{ secrets.BERNARDO_PASS }}
          CECILIO_USER: ${{ secrets.CECILIO_USER }}
          CECILIO_PASS: ${{ secrets.CECILIO_PASS }}
